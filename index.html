<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <!-- ✅ META VIEWPORT ESSENTIEL - viewport-fit=cover pour safe area iOS/Android -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    
    <meta name="description" content="AMALI - Application de rencontres halal au Sénégal" />
    
    <!-- ✅ PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- ✅ Theme Color -->
    <meta name="theme-color" content="#C85A34" />
    
    <!-- ✅ Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/assets/logoamali.png" />
    
    <!-- ✅ Meta tags pour Capacitor / Mobile natif -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AMALI" />
    
    <!-- Fonts Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>AMALI - Rencontres Halal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- ✅ Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('✅ Service Worker enregistré:', registration.scope);
            })
            .catch((error) => {
              console.log('❌ Erreur Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
